  - id: "events"
    full_name: "example-org/example-events"
    clone_url: "https://github.com/example-org/example-events.git"
    default_branch: "main"
    workflow_path: "WORKFLOW.md"
    provider: "codex"
    labels: ["repo:events"]

  - id: "contracts"
